        ];

        // Global State
        const app = {
            currentView: 'strategy', // 'strategy', 'production', or 'video'
            currentVideoId: null,
            activeFilter: 'ALL',
            
            init() {
                this.renderNav();
                this.setView('strategy');
            },

            setView(view, videoId = null) {
                this.currentView = view;
                this.currentVideoId = videoId;
                
                // Update Nav Active States
                document.querySelectorAll('#nav-overview button').forEach(btn => {
                    btn.classList.remove('bg-arenna-mint/30', 'font-bold');
                });
                if (view === 'strategy') document.getElementById('btn-strategy').classList.add('bg-arenna-mint/30', 'font-bold');
                if (view === 'production') document.getElementById('btn-production').classList.add('bg-arenna-mint/30', 'font-bold');

                this.renderNav(); // Re-render to update selected video styles
                this.renderContent();
            },

            setFilter(stage) {
                this.activeFilter = stage;
                this.renderNav();
            },

            getStageColor(stage) {
                switch(stage) {
                    case 'TOFU': return 'bg-arenna-mint text-arenna-blue';
                    case 'MOFU': return 'bg-arenna-pink text-arenna-blue';
                    case 'BOFU': return 'bg-arenna-green text-white';
                    default: return 'bg-arenna-mint text-arenna-blue';
                }
            },

            renderNav() {
                const nav = document.getElementById('nav-funnel');
                let html = `
                    <div class="flex gap-2 px-4 mb-4">
                        <button onclick="app.setFilter('ALL')" class="px-3 py-1 text-xs rounded-full font-bold transition-colors ${this.activeFilter === 'ALL' ? 'bg-arenna-blue text-white' : 'bg-white text-arenna-blue border border-arenna-mint/50'}">All</button>
                        <button onclick="app.setFilter('TOFU')" class="px-3 py-1 text-xs rounded-full font-bold transition-colors ${this.activeFilter === 'TOFU' ? 'bg-arenna-mint text-arenna-blue' : 'bg-white text-arenna-blue border border-arenna-mint/50'}">TOFU</button>
                        <button onclick="app.setFilter('MOFU')" class="px-3 py-1 text-xs rounded-full font-bold transition-colors ${this.activeFilter === 'MOFU' ? 'bg-arenna-pink text-arenna-blue' : 'bg-white text-arenna-blue border border-arenna-mint/50'}">MOFU</button>
                        <button onclick="app.setFilter('BOFU')" class="px-3 py-1 text-xs rounded-full font-bold transition-colors ${this.activeFilter === 'BOFU' ? 'bg-arenna-green text-white' : 'bg-white text-arenna-blue border border-arenna-mint/50'}">BOFU</button>
                    </div>
                `;

                const filteredVideos = this.activeFilter === 'ALL' 
                    ? videoData 
                    : videoData.filter(v => v.stage === this.activeFilter);

                filteredVideos.forEach(v => {
                    const isActive = this.currentView === 'video' && this.currentVideoId === v.id;
                    const stageBadge = `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${this.getStageColor(v.stage)}">${v.stage}</span>`;
                    
                    html += `
                        <button onclick="app.setView('video', '${v.id}')" class="w-full text-left px-4 py-3 border-l-4 transition-all hover:bg-white/60 ${isActive ? 'border-arenna-orange bg-white shadow-sm' : 'border-transparent'}">
                            <div class="flex items-center gap-2 mb-1">
                                ${stageBadge}
                                <span class="text-xs text-arenna-blue/60 font-medium">Vol. ${v.id}</span>
                            </div>
                            <h3 class="text-sm font-bold leading-tight ${isActive ? 'text-arenna-blue' : 'text-arenna-blue/80'}">${v.title}</h3>
                        </button>
                    `;
                });

                nav.innerHTML = html;
            },

            renderContent() {
                const main = document.getElementById('main-content');
                
                if (this.currentView === 'strategy') {
                    main.innerHTML = this.templateStrategy();
                } else if (this.currentView === 'production') {
                    main.innerHTML = this.templateProduction();
                } else if (this.currentView === 'video') {
                    const video = videoData.find(v => v.id === this.currentVideoId);
                    main.innerHTML = this.templateVideo(video);
                }
            },

            templateStrategy() {
                return `
                    <div class="p-10 overflow-y-auto h-full fade-in">
                        <div class="max-w-4xl mx-auto">
                            <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-2">Master Strategy</h2>
                            <h1 class="text-4xl font-extrabold tracking-tight mb-4">The Funnel Map</h1>
                            <p class="text-lg brand-italic text-arenna-blue/80 mb-10">The non-member booking is the entry point to the funnel — not the end of it.</p>
                            
                            <div class="grid grid-cols-3 gap-6 mb-12">
                                <div class="glass-panel p-6 rounded-2xl relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-full h-1 bg-arenna-mint"></div>
                                    <h3 class="font-bold text-xl mb-1">TOFU</h3>
                                    <p class="text-sm text-arenna-blue/70 mb-4">Awareness / Discovery</p>
                                    <p class="text-2xl font-black mb-1">5 Videos</p>
                                    <p class="text-sm text-arenna-blue/80 mb-4 brand-italic">Cold Audiences</p>
                                    <div class="inline-block bg-arenna-blue text-white text-xs font-bold px-3 py-1 rounded-full">CTA: Book a Court</div>
                                </div>
                                <div class="glass-panel p-6 rounded-2xl relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-full h-1 bg-arenna-pink"></div>
                                    <h3 class="font-bold text-xl mb-1">MOFU</h3>
                                    <p class="text-sm text-arenna-blue/70 mb-4">Consideration / Retarget</p>
                                    <p class="text-2xl font-black mb-1">3 Videos</p>
                                    <p class="text-sm text-arenna-blue/80 mb-4 brand-italic">Warm Audiences</p>
                                    <div class="inline-block bg-arenna-blue text-white text-xs font-bold px-3 py-1 rounded-full">CTA: Play Your First Session</div>
                                </div>
                                <div class="glass-panel p-6 rounded-2xl relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-full h-1 bg-arenna-green"></div>
                                    <h3 class="font-bold text-xl mb-1">BOFU</h3>
                                    <p class="text-sm text-arenna-blue/70 mb-4">Conversion / Retention</p>
                                    <p class="text-2xl font-black mb-1">4 Videos</p>
                                    <p class="text-sm text-arenna-blue/80 mb-4 brand-italic">Hot Leads + Bookers</p>
                                    <div class="inline-block bg-arenna-blue text-white text-xs font-bold px-3 py-1 rounded-full">CTA: Become a Member</div>
                                </div>
                            </div>

                            <div class="bg-white rounded-2xl p-8 shadow-sm border border-arenna-mint/20">
                                <h3 class="text-lg font-bold mb-4">Post-Booking Flow (Upsell)</h3>
                                <div class="flex flex-col gap-4">
                                    <div class="flex gap-4 items-start">
                                        <div class="w-8 h-8 rounded-full bg-arenna-mint flex items-center justify-center font-bold text-sm shrink-0">0</div>
                                        <div><p class="font-bold">User Books Session</p><p class="text-sm text-arenna-blue/70">Email: Welcome to the court</p></div>
                                    </div>
                                    <div class="w-0.5 h-6 bg-arenna-mint/50 ml-4"></div>
                                    <div class="flex gap-4 items-start">
                                        <div class="w-8 h-8 rounded-full bg-arenna-pink flex items-center justify-center font-bold text-sm shrink-0">1</div>
                                        <div><p class="font-bold">Retargeting Ad (Days 1-3)</p><p class="text-sm text-arenna-blue/70">Video 09: You've Played. Now Belong.</p></div>
                                    </div>
                                    <div class="w-0.5 h-6 bg-arenna-pink/50 ml-4"></div>
                                    <div class="flex gap-4 items-start">
                                        <div class="w-8 h-8 rounded-full bg-arenna-green text-white flex items-center justify-center font-bold text-sm shrink-0">2</div>
                                        <div><p class="font-bold">Retargeting Ad (Days 7-10)</p><p class="text-sm text-arenna-blue/70">Video 10: The Founding Member Offer</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            templateProduction() {
                return `
                    <div class="p-10 overflow-y-auto h-full fade-in">
                        <div class="max-w-4xl mx-auto">
                            <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-2">Guidelines</h2>
                            <h1 class="text-4xl font-extrabold tracking-tight mb-8">Production Notes</h1>
                            
                            <div class="grid grid-cols-2 gap-8">
                                <div class="space-y-6">
                                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-arenna-mint/20">
                                        <div class="flex items-center gap-3 mb-4">
                                            <i class="ph ph-aperture text-2xl text-arenna-orange"></i>
                                            <h3 class="font-bold text-lg">Aesthetic</h3>
                                        </div>
                                        <ul class="space-y-2 text-sm text-arenna-blue/80">
                                            <li>• Warm-toned, golden hour when possible. Rich contrast. Not oversaturated.</li>
                                            <li>• Court glass reflections, athletic movement, human connection.</li>
                                            <li>• Interiors feel premium: high ceilings, clean lines, soft light.</li>
                                            <li>• People are real — diverse (35–55), aspirational but relatable.</li>
                                            <li>• <strong>No stock footage feel.</strong> Everything is raw, alive, kinetic.</li>
                                        </ul>
                                    </div>

                                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-arenna-mint/20">
                                        <div class="flex items-center gap-3 mb-4">
                                            <i class="ph ph-text-t text-2xl text-arenna-orange"></i>
                                            <h3 class="font-bold text-lg">Text Treatment</h3>
                                        </div>
                                        <ul class="space-y-2 text-sm text-arenna-blue/80">
                                            <li>• Font: <strong>Red Hat Display</strong> (caps for headlines).</li>
                                            <li>• Emphasis: <span class="brand-italic">Noto Serif Italic</span> (reduced opacity).</li>
                                            <li>• Never more than 6 words on screen at once during action.</li>
                                            <li>• Lower-thirds: Blue Serve background, Cream Arenna text.</li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="space-y-6">
                                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-arenna-mint/20">
                                        <div class="flex items-center gap-3 mb-4">
                                            <i class="ph ph-music-notes text-2xl text-arenna-orange"></i>
                                            <h3 class="font-bold text-lg">Music Direction</h3>
                                        </div>
                                        <ul class="space-y-3 text-sm text-arenna-blue/80">
                                            <li><strong class="text-arenna-blue">TOFU:</strong> Driving, modern, slightly moody electronic (Glass Animals).</li>
                                            <li><strong class="text-arenna-blue">MOFU:</strong> Energetic, percussive. Builds. Indie electronic.</li>
                                            <li><strong class="text-arenna-blue">BOFU:</strong> Warm, triumphant, cinematic. Strings + synth.</li>
                                            <li><strong class="text-arenna-blue">Member:</strong> Elevated, emotional, full feel. Signals belonging.</li>
                                        </ul>
                                    </div>

                                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-arenna-mint/20">
                                        <div class="flex items-center gap-3 mb-4">
                                            <i class="ph ph-palette text-2xl text-arenna-orange"></i>
                                            <h3 class="font-bold text-lg">Brand Voice Check</h3>
                                        </div>
                                        <ul class="space-y-2 text-sm text-arenna-blue/80">
                                            <li>• Motivational, energetic, close/friendly.</li>
                                            <li>• <strong class="text-arenna-terracotta">No emojis.</strong></li>
                                            <li>• No elitist tone. No sports clichés.</li>
                                            <li>• Core Phrase: <span class="brand-italic">"Unlock your potential"</span></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            templateVideo(v) {
                const scenesHtml = v.scenes.map((s, i) => `
                    <tr class="border-b border-arenna-mint/20 hover:bg-white/50 transition-colors">
                        <td class="py-3 px-4 text-xs font-bold text-arenna-blue/50">${String(i + 1).padStart(2, '0')}</td>
                        <td class="py-3 px-4 text-xs font-mono bg-arenna-mint/10 whitespace-nowrap">${s.time}</td>
                        <td class="py-3 px-4 text-sm font-semibold">${s.shot}</td>
                        <td class="py-3 px-4 text-sm text-arenna-blue/80">${s.action}</td>
                        <td class="py-3 px-4 text-sm text-arenna-blue/80 italic">${s.audio}</td>
                    </tr>
                `).join('');

                const textHtml = v.text.map(t => `<li class="mb-2"><span class="bg-arenna-blue text-white px-2 py-0.5 rounded text-xs font-mono mr-2">${t.split(':')[0]}</span><span class="font-bold tracking-wide">${t.split(':')[1]}</span></li>`).join('');
                const instrHtml = v.instructions.map(i => `<li class="mb-2 text-sm flex gap-2"><i class="ph ph-check-circle text-arenna-orange mt-0.5"></i> <span>${i}</span></li>`).join('');

                return `
                    <div class="overflow-y-auto h-full fade-in pb-20">
                        <!-- Hero Section -->
                        <div class="bg-white border-b border-arenna-mint/30 p-10 pt-12">
                            <div class="max-w-5xl mx-auto">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="text-xs font-bold px-2 py-1 rounded ${this.getStageColor(v.stage)}">${v.stage}</span>
                                    <span class="text-sm font-medium text-arenna-blue/60 border border-arenna-blue/20 px-2 py-0.5 rounded-full">${v.formats}</span>
                                </div>
                                <h1 class="text-4xl font-extrabold tracking-tight uppercase mb-4 text-arenna-blue">
                                    <span class="text-arenna-blue/30 mr-2">V${v.id}</span>${v.title}
                                </h1>
                                <p class="text-xl brand-italic text-arenna-blue/80 max-w-3xl leading-relaxed">${v.concept}</p>
                            </div>
                        </div>

                        <div class="p-10 max-w-5xl mx-auto space-y-8">
                            
                            <!-- Meta Grid -->
                            <div class="grid grid-cols-3 gap-4">
                                <div class="glass-panel p-5 rounded-xl">
                                    <p class="text-[10px] uppercase font-bold text-arenna-blue/50 tracking-widest mb-1">Objective</p>
                                    <p class="text-sm font-medium leading-snug">${v.objective}</p>
                                </div>
                                <div class="glass-panel p-5 rounded-xl">
                                    <p class="text-[10px] uppercase font-bold text-arenna-blue/50 tracking-widest mb-1">Target Personas</p>
                                    <p class="text-sm font-medium leading-snug">${v.personas}</p>
                                </div>
                                <div class="bg-arenna-blue text-white p-5 rounded-xl relative overflow-hidden">
                                    <i class="ph ph-cursor-click absolute -right-4 -bottom-4 text-6xl text-white/10"></i>
                                    <p class="text-[10px] uppercase font-bold text-white/50 tracking-widest mb-1">Call to Action</p>
                                    <p class="text-sm font-bold text-arenna-orange">${v.cta}</p>
                                </div>
                            </div>

                            <!-- Scene Breakdown -->
                            <div>
                                <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-4 flex items-center gap-2">
                                    <i class="ph ph-film-strip text-lg"></i> Scene Breakdown
                                </h2>
                                <div class="bg-white rounded-xl shadow-sm border border-arenna-mint/30 overflow-hidden">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="bg-arenna-cream border-b border-arenna-mint/30">
                                                <th class="py-3 px-4 text-xs font-bold text-arenna-blue/50 uppercase w-12">#</th>
                                                <th class="py-3 px-4 text-xs font-bold text-arenna-blue/50 uppercase w-24">Time</th>
                                                <th class="py-3 px-4 text-xs font-bold text-arenna-blue/50 uppercase w-32">Shot</th>
                                                <th class="py-3 px-4 text-xs font-bold text-arenna-blue/50 uppercase">Action</th>
                                                <th class="py-3 px-4 text-xs font-bold text-arenna-blue/50 uppercase w-1/4">Audio</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${scenesHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Layout Grid for Details -->
                            <div class="grid grid-cols-2 gap-8">
                                <div>
                                    <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-4">On-Screen Text</h2>
                                    <ul class="bg-white p-6 rounded-xl border border-arenna-mint/30 shadow-sm">
                                        ${textHtml}
                                    </ul>

                                    <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-4 mt-8">Voiceover Script</h2>
                                    <div class="bg-white p-6 rounded-xl border border-arenna-mint/30 shadow-sm">
                                        <p class="brand-italic text-lg text-arenna-blue leading-relaxed border-l-4 border-arenna-orange pl-4">${v.voiceover}</p>
                                    </div>
                                </div>

                                <div>
                                    <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-4">Edit Instructions</h2>
                                    <ul class="bg-arenna-blue text-arenna-cream p-6 rounded-xl shadow-sm">
                                        ${instrHtml}
                                    </ul>

                                    <h2 class="text-sm font-bold tracking-widest uppercase text-arenna-terracotta mb-4 mt-8">Ad Copy Library</h2>
                                    <div class="glass-panel p-6 rounded-xl border-arenna-orange/30 border">
                                        <p class="text-sm text-arenna-blue/90 mb-3 text-xs uppercase tracking-widest font-bold">Primary Meta/IG Copy</p>
                                        <p class="text-sm font-medium leading-relaxed">${v.adCopy}</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
